# Render Blueprint — SalesDesk as one always-on web service + a Postgres DB.
#
# Deploy:
#   1. Push this repo to GitHub (done).
#   2. https://dashboard.render.com -> New -> Blueprint -> connect Hasnu07/salesdesk
#   3. Click Apply. Render creates the database and the web service, and wires
#      DATABASE_URL into the service automatically.
#   4. You get a permanent URL like https://salesdesk.onrender.com
#
# The Express backend serves the built frontend AND the /api store, so it's one
# service / one URL. Storage is PostgreSQL (durable + shared across every
# device), so data entered anywhere is consistent everywhere and survives
# redeploys. Render injects $PORT and $DATABASE_URL.

databases:
  - name: salesdesk-db
    plan: free
    databaseName: salesdesk
    user: salesdesk

services:
  - type: web
    name: salesdesk
    runtime: node
    plan: free
    buildCommand: npm run install:all && npm run build
    startCommand: npm --prefix backend start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: salesdesk-db
          property: connectionString

# Free-plan notes:
#   - The web service sleeps after ~15 min idle and cold-starts on next visit.
#   - The free Postgres instance is durable (data persists across redeploys),
#     but Render expires free databases after a period — upgrade the DB plan to
#     keep it long-term. Data consistency across devices works on any plan.
